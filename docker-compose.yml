services:
  market-service:
    build:
      context: ./apps/market-service
      dockerfile: Dockerfile
    container_name: kobra-market-service
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ./.env
    depends_on:
      - agent
    networks:
      - kobra-net

  agent:
    build:
      context: ./apps/agent
      dockerfile: Dockerfile
    container_name: kobra-agent
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    networks:
      - kobra-net

  dashboard:
    build:
      context: ./apps/dashboard
      dockerfile: Dockerfile
      args:
        VITE_AGENT_API_BASE: http://localhost:8000
        VITE_MARKET_API_BASE: http://localhost:3001
    container_name: kobra-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./.env
    depends_on:
      - market-service
    networks:
      - kobra-net

networks:
  kobra-net:
    driver: bridge